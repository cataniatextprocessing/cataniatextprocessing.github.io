<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>Text Processing Research Group</title>
</head>

<body>

    <div id="header"></div>

    <section style="max-width:1080px;margin:0 auto;padding:84px 32px 14px">
        <div
            style="font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.2em;text-transform:uppercase;color:#1d3c70;margin-bottom:24px">
            Publications</div>
        <h1 style="font-size:46px;line-height:1.08;font-weight:600;letter-spacing:-0.015em;margin:0 0 16px">
            Papers</h1>
        <p style="font-size:18px;line-height:1.65;color:#4a463d;max-width:60ch;margin:0;font-weight:300">
            Selected publications by members of the group. Author names are listed as they appear.</p>
    </section>


    <section style="max-width:1080px;margin:0 auto;padding:30px 32px 10px">
        <div id="papers-list"></div>
    </section>

    <div id="footer"></div>

    <script>
        async function load(id, file) {
            const res = await fetch(file);
            if (!res.ok) throw new Error(`Couldn't load ${file}`);
            document.getElementById(id).innerHTML = await res.text();
        }

        load("header", "header.html");
        load("footer", "footer.html");

        function toggleBib(id) {
            const bib = document.getElementById(id);

            if (!bib) {
                console.error("BibTeX block not found:", id);
                return;
            }

            bib.style.display = bib.style.display === "none" ? "block" : "none";
        }

        async function loadPapers() {
            const res = await fetch("papers.json");
            const papers = await res.json();

            const grouped = {};

            papers.forEach(paper => {
                if (!grouped[paper.year]) grouped[paper.year] = [];
                grouped[paper.year].push(paper);
            });

            const container = document.getElementById("papers-list");

            Object.keys(grouped).sort((a, b) => b - a).forEach(year => {
                container.innerHTML += `
      <div style="font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:0.06em;color:#1d3c70;padding-bottom:14px;border-bottom:2px solid #1d3c70;margin-bottom:6px;margin-top:1cm">
        ${year}
      </div>
    `;

                grouped[year].forEach((paper, index) => {
                    const bibId = `bib-${year}-${index}`;

                    container.innerHTML += `
        <div style="padding:30px 0;border-bottom:1px solid #e4e0d7">
          <div style="display:flex;gap:10px;align-items:center;margin-bottom:12px">
            <span style="
            font-family:'IBM Plex Mono',monospace;
            font-size:11px;
            letter-spacing:0.04em;
            color:${paper.type === 'Journal' ? '#2f6b2f' : '#1d3c70'};
            background:${paper.type === 'Journal' ? '#edf7ed' : '#eef1f7'};
            border:1px solid ${paper.type === 'Journal' ? '#cfe7cf' : '#dbe2ef'};
            padding:3px 9px;
            border-radius:3px;
            ">
            ${paper.venue}
            </span>
            <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:#a39d90">
              ${paper.type}
            </span>
          </div>

          <h3 style="font-size:23px;font-weight:600;line-height:1.3;margin:0 0 10px">
            ${paper.title}
          </h3>

          <div style="font-size:16px;color:#4a463d;margin-bottom:6px;font-weight:300">
            ${paper.authors.join(", ")}
          </div>
        </div>
      `;
                });
            });
        }

        function toggleBib(id) {
            const bib = document.getElementById(id);
            bib.style.display = bib.style.display === "block" ? "none" : "block";
        }

        loadPapers();

        const venueStyle =
            paper.type === "Journal"
                ? {
                    color: "#2f6b2f",
                    background: "#edf7ed",
                    border: "#cfe7cf"
                }
                : {
                    color: "#1d3c70",
                    background: "#eef1f7",
                    border: "#dbe2ef"
                };
    </script>

</body>

</html>
