<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
    <title>Text Processing Research Group</title>
</head>

<body>

    <div id="header"></div>

    <main style="min-height:60vh">

        <section style="max-width:1080px;margin:0 auto;padding:84px 32px 14px">
            <div
                style="font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.2em;text-transform:uppercase;color:#1d3c70;margin-bottom:24px">
                People
            </div>

            <h1 style="font-size:46px;line-height:1.08;font-weight:600;letter-spacing:-0.015em;margin:0 0 16px">
                Our team
            </h1>

            <p style="font-size:18px;line-height:1.65;color:#4a463d;max-width:64ch;margin:0;font-weight:300">
                Members, collaborators, and former members of the Text Processing Research Group at the University of
                Catania.
            </p>
        </section>

        <section style="max-width:1080px;margin:0 auto;padding:40px 32px 10px">
            <h2 style="font-size:28px;font-weight:600;margin:0 0 28px">Current members</h2>
            <div id="current-members" style="display:grid;grid-template-columns:repeat(3,1fr);gap:40px 36px"></div>
        </section>

        <section style="max-width:1080px;margin:0 auto;padding:60px 32px 10px">
            <h2 style="font-size:28px;font-weight:600;margin:0 0 28px">Frequent collaborators</h2>
            <div id="frequent-collaborators" style="display:grid;grid-template-columns:repeat(3,1fr);gap:40px 36px">
            </div>
        </section>

        <section style="max-width:1080px;margin:0 auto;padding:60px 32px 30px">
            <h2 style="font-size:28px;font-weight:600;margin:0 0 28px">Past members</h2>
            <div id="past-members" style="display:grid;grid-template-columns:repeat(3,1fr);gap:40px 36px"></div>
        </section>

    </main>



    <div id="footer"></div>
    <script>

        async function load(id, file) {
            const res = await fetch(file);
            if (!res.ok) throw new Error(`Couldn't load ${file}`);
            document.getElementById(id).innerHTML = await res.text();
        }

        load("header", "header.html");
        load("footer", "footer.html");
        async function loadPeople() {
            const res = await fetch("people.json");
            const people = await res.json();

            renderPeople("current-members", people.filter(p => p.memberStatus === "current"));
            renderPeople("frequent-collaborators", people.filter(p => p.memberStatus === "collaborator"));
            renderPeople("past-members", people.filter(p => p.memberStatus === "past"));
        }

        function renderPeople(containerId, people) {
            const container = document.getElementById(containerId);

            container.innerHTML = people.map(person => `
    <div style="display:flex;flex-direction:column">

      <img
        src="${person.photo || 'img/photos/tmp.png'}"
        alt="${person.name}"
        style="width:120px;height:120px;object-fit:cover;border-radius:50%;margin-bottom:18px;">

      <div style="font-size:20px;font-weight:600;margin-bottom:3px">
        ${person.name}
      </div>

      <div style="font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:0.04em;color:#1d3c70;margin-bottom:10px">
        ${person.role}
      </div>

      <div style="font-size:14.5px;color:#6f6a60;font-weight:300;line-height:1.55;margin-bottom:12px">
        ${person.description}
      </div>

      ${person.website ? `
        <a href="${person.website}"
           target="_blank"
           rel="noopener"
           style="font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#1d3c70;text-decoration:none">
          Website ↗
        </a>
      ` : ""}

    </div>
  `).join("");
        }

        loadPeople();
    </script>
</body>

</html>
